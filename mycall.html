<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calls — Call a Friend</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/nav.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p:#0369a1;--a:#06b6d4;--d:#0c1a2e;--s:#64748b;--b:#e2e8f0;--o:#f8fafc;}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#f0f6ff;min-height:100vh;width:100%;overflow-x:hidden;}

/* LOADING */
#loadScreen{position:fixed;inset:0;background:#f0f6ff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.ls-icon{font-size:3rem;animation:pop 0.6s cubic-bezier(0.16,1,0.3,1);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.ls-spin{width:32px;height:32px;border:3px solid #e0f2fe;border-top-color:var(--p);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE */
.page{display:none;padding-bottom:90px;}
.page.show{display:block;}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--d) 0%,var(--p) 100%);
  padding:20px 16px 50px;position:relative;overflow:hidden;
}
.header::before{content:"";position:absolute;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,0.04);top:-80px;right:-60px;}
.header::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(6,182,212,0.08);bottom:-60px;left:-40px;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:20px;position:relative;z-index:1;}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.2s;flex-shrink:0;}
.back-btn:hover{background:rgba(255,255,255,0.2);}
.header-title{font-size:1rem;font-weight:700;color:white;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1;}
.stat-box{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px 10px;text-align:center;}
.stat-num{font-size:1.3rem;font-weight:800;color:white;line-height:1;}
.stat-lbl{font-size:0.6rem;color:rgba(255,255,255,0.65);font-weight:600;margin-top:3px;letter-spacing:0.3px;}

/* CONTENT */
.content{margin-top:-28px;padding:0 14px 16px;position:relative;z-index:2;}

/* FILTER TABS */
.tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 18px;border-radius:100px;border:1.5px solid var(--b);background:white;font-family:"Plus Jakarta Sans",sans-serif;font-size:0.75rem;font-weight:700;color:var(--s);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.tab.active{background:var(--d);color:white;border-color:var(--d);}
.tab:hover:not(.active){border-color:var(--a);color:var(--p);}

/* BOOKING CARD */
.bcard{
  background:white;border-radius:20px;padding:18px;
  margin-bottom:12px;box-shadow:0 2px 14px rgba(3,105,161,0.07);
  border:1px solid var(--b);cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  position:relative;overflow:hidden;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.bcard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(3,105,161,0.13);}
.bcard:active{transform:scale(0.98);}

/* STATUS BAR TOP */
.bcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.bcard.pending::before{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.bcard.approved::before{background:linear-gradient(90deg,#16a34a,#4ade80);}
.bcard.rejected::before{background:linear-gradient(90deg,#dc2626,#f87171);}

/* CARD TOP */
.bc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.bc-friend{display:flex;align-items:center;gap:10px;}
.bc-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#e0f2fe,#cffafe);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.bc-fname{font-size:0.9rem;font-weight:700;color:var(--d);}
.bc-lang{font-size:0.7rem;color:var(--s);margin-top:2px;}

/* STATUS BADGE */
.status{padding:5px 12px;border-radius:100px;font-size:0.7rem;font-weight:800;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.s-pending{background:#fef3c7;color:#92400e;}
.s-approved{background:#dcfce7;color:#166534;}
.s-rejected{background:#fee2e2;color:#991b1b;}

/* DIVIDER */
.bc-div{height:1px;background:#f1f5f9;margin:12px 0;}

/* DETAILS */
.bc-details{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bc-detail{}
.bd-lbl{font-size:0.62rem;color:var(--s);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.bd-val{font-size:0.83rem;font-weight:700;color:var(--d);}
.bd-val.green{color:#16a34a;}
.bd-val.blue{color:var(--p);}

/* BOOKING ID */
.bc-id{margin-top:12px;padding:9px 12px;background:#f8fafc;border-radius:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--b);}
.bc-id-lbl{font-size:0.65rem;color:var(--s);font-weight:600;}
.bc-id-val{font-size:0.72rem;font-weight:800;color:var(--p);font-family:monospace;letter-spacing:0.5px;}

/* USER MESSAGE */
.bc-msg{margin-top:10px;padding:10px 12px;background:#f0f9ff;border-radius:10px;border-left:3px solid var(--a);font-size:0.78rem;color:var(--s);font-style:italic;line-height:1.5;}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;}
.ei{font-size:4rem;margin-bottom:14px;}
.et{font-size:1rem;font-weight:700;color:var(--d);margin-bottom:8px;}
.es{font-size:0.83rem;color:var(--s);line-height:1.6;margin-bottom:24px;}
.ebtn{background:linear-gradient(135deg,var(--d),var(--p));color:white;font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:0.9rem;padding:13px 28px;border-radius:100px;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(3,105,161,0.3);transition:all 0.2s;}
.ebtn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(3,105,161,0.4);}

/* NOT LOGGED IN */
.login-prompt{background:white;border-radius:20px;padding:32px 20px;text-align:center;margin:20px 14px;box-shadow:0 2px 14px rgba(3,105,161,0.07);border:1px solid var(--b);}
.lp-icon{font-size:3rem;margin-bottom:14px;}
.lp-title{font-size:1rem;font-weight:700;color:var(--d);margin-bottom:8px;}
.lp-sub{font-size:0.83rem;color:var(--s);line-height:1.6;margin-bottom:20px;}
.lp-btn{background:linear-gradient(135deg,var(--d),var(--p));color:white;font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:0.9rem;padding:13px 28px;border-radius:100px;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(3,105,161,0.3);transition:all 0.2s;text-decoration:none;display:inline-block;}
.lp-btn:hover{transform:translateY(-2px);}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--d);color:white;padding:10px 22px;border-radius:100px;font-size:0.82rem;font-weight:600;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadScreen">
  <div class="ls-icon">📞</div>
  <div class="ls-spin"></div>
</div>

<!-- PAGE -->
<div class="page" id="mainPage">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <a href="account.html" class="back-btn">←</a>
      <div class="header-title">📞 My Calls</div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Total Calls</div></div>
      <div class="stat-box"><div class="stat-num" id="sApproved">0</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-box"><div class="stat-num" id="sSpent">₹0</div><div class="stat-lbl">Total Spent</div></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- FILTER TABS -->
    <div class="tabs" id="tabsRow">
      <div class="tab active" onclick="filter('all',this)">🗂️ Sab</div>
      <div class="tab" onclick="filter('pending',this)">⏳ Pending</div>
      <div class="tab" onclick="filter('approved',this)">✅ Approved</div>
      <div class="tab" onclick="filter('rejected',this)">❌ Rejected</div>
    </div>

    <!-- BOOKINGS LIST -->
    <div id="bookingsList"></div>

  </div>
</div>

<!-- INLINE NAV -->
<div id="bottomNav" style="position:fixed;bottom:0;left:0;right:0;height:auto;min-height:64px;background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(3,105,161,0.08);box-shadow:0 -8px 32px rgba(3,105,161,0.10);z-index:999;padding:8px 12px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom));">
  <a href="index.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;color:#94a3b8;padding:4px 0;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span style="font-size:0.62rem;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;">Home</span>
  </a>
  <a href="mycall.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;padding:4px 0;position:relative;">
    <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#0369a1,#06b6d4);display:flex;align-items:center;justify-content:center;margin-top:-18px;box-shadow:0 6px 20px rgba(3,105,161,0.4);border:2.5px solid white;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.64a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </div>
    <span style="font-size:0.62rem;font-weight:700;color:#0369a1;font-family:'Plus Jakarta Sans',sans-serif;">My Call</span>
  </a>
  <a href="account.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-decoration:none;color:#94a3b8;padding:4px 0;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span style="font-size:0.62rem;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;">Account</span>
  </a>
</div>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyChyETFT5LuVb1tkj4R6IG5gx8tyaDJjuc",
  authDomain:"call-friend-b8bb3.firebaseapp.com",
  projectId:"call-friend-b8bb3",
  storageBucket:"call-friend-b8bb3.firebasestorage.app",
  messagingSenderId:"373738461022",
  appId:"1:373738461022:web:d9c74804f2018019b6e1cf"
});
const auth = firebase.auth();
const db   = firebase.firestore();

let allBookings = [];
let curFilter   = 'all';
let userPhone   = '';

const friendEmoji = {'Funny Friend':'😂','Caring Friend':'🤗','Best Friend':'💪','Bro':'😎','More...':'✨'};
function getEmoji(t){ for(const [k,v] of Object.entries(friendEmoji)){ if((t||'').includes(k)) return v; } return '🤙'; }

// ── AUTH ──
auth.onAuthStateChanged(async user => {
  if(!user){
    // Not logged in — show login prompt
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('mainPage').classList.add('show');
    document.getElementById('tabsRow').style.display = 'none';
    document.getElementById('bookingsList').innerHTML = `
      <div class="login-prompt">
        <div class="lp-icon">🔒</div>
        <div class="lp-title">Login Zaroori Hai</div>
        <div class="lp-sub">Apni bookings dekhne ke liye pehle login karo</div>
        <a href="login.html" class="lp-btn">🚀 Login Karo</a>
      </div>`;
    return;
  }

  // Get user profile for phone number
  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if(snap.exists) userPhone = snap.data().phone || '';
  } catch(e) {}

  // Load bookings by phone OR by uid
  await loadBookings(user);
});

async function loadBookings(user) {
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('mainPage').classList.add('show');

  try {
    let snap;
    if(userPhone) {
      // Search by phone number (linked to booking form)
      snap = await db.collection('bookings')
        .where('phone', '==', userPhone)
        .orderBy('createdAt','desc')
        .get();
    } else {
      // Search by email if no phone
      const email = user.email || '';
      snap = await db.collection('bookings')
        .where('phone', '==', email)
        .orderBy('createdAt','desc')
        .get();
    }

    allBookings = snap.docs.map(d => ({id:d.id, ...d.data()}));
    updateStats();
    renderBookings();

  } catch(e) {
    // If index error, try without orderBy
    try {
      let snap2;
      if(userPhone) {
        snap2 = await db.collection('bookings').where('phone','==',userPhone).get();
      } else {
        snap2 = await db.collection('bookings').get();
        // Filter by user email
        const docs = snap2.docs.filter(d => d.data().phone === user.email);
        allBookings = docs.map(d => ({id:d.id, ...d.data()}));
        updateStats(); renderBookings(); return;
      }
      allBookings = snap2.docs.map(d => ({id:d.id,...d.data()}));
      // Sort manually
      allBookings.sort((a,b) => {
        const ta = a.createdAt?.toDate?.()?.getTime() || 0;
        const tb = b.createdAt?.toDate?.()?.getTime() || 0;
        return tb - ta;
      });
      updateStats(); renderBookings();
    } catch(e2) {
      document.getElementById('bookingsList').innerHTML = `
        <div class="empty">
          <div class="ei">⚠️</div>
          <div class="et">Kuch error aaya</div>
          <div class="es">Dobara try karo</div>
        </div>`;
    }
  }
}

// ── STATS ──
function updateStats(){
  const approved = allBookings.filter(b=>b.status==='approved');
  const spent    = approved.reduce((s,b)=>s+(b.amount||0),0);
  document.getElementById('sTotal').textContent    = allBookings.length;
  document.getElementById('sApproved').textContent = approved.length;
  document.getElementById('sSpent').textContent    = '₹'+spent;
}

// ── FILTER ──
function filter(f, el){
  curFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderBookings();
}

// ── RENDER ──
function renderBookings(){
  let data = allBookings;
  if(curFilter !== 'all') data = data.filter(b=>b.status===curFilter);
  const list = document.getElementById('bookingsList');

  if(data.length === 0){
    const msgs = {
      all    : ['📭','Koi booking nahi mili','Abhi tak koi call book nahi ki'],
      pending: ['⏳','Koi pending booking nahi','Saari bookings process ho gayi hain'],
      approved:['✅','Koi approved booking nahi','Abhi tak koi call approve nahi hua'],
      rejected:['❌','Koi rejected booking nahi','Sab theek hai!']
    };
    const [ei, et, es] = msgs[curFilter] || msgs.all;
    list.innerHTML = `
      <div class="empty">
        <div class="ei">${ei}</div>
        <div class="et">${et}</div>
        <div class="es">${es}</div>
        ${curFilter==='all'?`<button class="ebtn" onclick="window.location.href='index.html#book'">🤙 Dost Book Karo</button>`:''}
      </div>`;
    return;
  }

  list.innerHTML = data.map((b,i) => {
    const ts = b.createdAt?.toDate?.().toLocaleDateString('en-IN',{
      day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
    }) || '—';
    const sc = b.status==='pending'?'pending':b.status==='approved'?'approved':'rejected';
    const sb = b.status==='pending'?'s-pending':b.status==='approved'?'s-approved':'s-rejected';
    const sl = b.status==='pending'?'⏳ Pending':b.status==='approved'?'✅ Approved':'❌ Rejected';
    const em = getEmoji(b.friendType);
    return `
    <div class="bcard ${sc}" style="animation-delay:${i*0.07}s">
      <div class="bc-top">
        <div class="bc-friend">
          <div class="bc-avatar">${em}</div>
          <div>
            <div class="bc-fname">${b.friendType||'Friend'}</div>
            <div class="bc-lang">${b.language||'Hindi'}</div>
          </div>
        </div>
        <span class="status ${sb}">${sl}</span>
      </div>
      <div class="bc-div"></div>
      <div class="bc-details">
        <div class="bc-detail">
          <div class="bd-lbl">👤 Naam</div>
          <div class="bd-val">${b.name||'—'}</div>
        </div>
        <div class="bc-detail">
          <div class="bd-lbl">📞 Phone</div>
          <div class="bd-val blue">${b.phone||'—'}</div>
        </div>
        <div class="bc-detail">
          <div class="bd-lbl">⏱️ Plan</div>
          <div class="bd-val blue">${b.selectedPlan||'—'}</div>
        </div>
        <div class="bc-detail">
          <div class="bd-lbl">💰 Amount</div>
          <div class="bd-val green">₹${b.amount||0}</div>
        </div>
        <div class="bc-detail">
          <div class="bd-lbl">📅 Call Time</div>
          <div class="bd-val">${b.callTime||'Set nahi'}</div>
        </div>
        <div class="bc-detail">
          <div class="bd-lbl">🕐 Book Kiya</div>
          <div class="bd-val">${ts}</div>
        </div>
      </div>
      <div class="bc-id">
        <span class="bc-id-lbl">Booking ID</span>
        <span class="bc-id-val">${b.id.slice(0,10).toUpperCase()}</span>
      </div>
      ${b.userMessage?`<div class="bc-msg">💬 "${b.userMessage}"</div>`:''}
    </div>`;
  }).join('');
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
</script>
</body>
</html>
