<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Call a Friend</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:#0a1628;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(3,105,161,0.3) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(6,182,212,0.2) 0%,transparent 50%);
}
body::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(56,189,248,0.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(56,189,248,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.login-card{
  position:relative;z-index:10;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.15);
  border-radius:24px;
  padding:44px 36px;
  width:100%;max-width:400px;
  margin:20px;
  box-shadow:0 32px 80px rgba(0,0,0,0.4);
  animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{
  width:60px;height:60px;
  background:linear-gradient(135deg,#0369a1,#06b6d4);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:0 auto 14px;
  box-shadow:0 8px 24px rgba(6,182,212,0.35);
}
.logo-title{font-size:1.15rem;font-weight:700;color:white;}
.logo-sub{font-size:0.72rem;color:rgba(255,255,255,0.35);font-family:'DM Mono',monospace;margin-top:4px;letter-spacing:1.5px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.field input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:12px;font-family:'DM Sans',sans-serif;
  font-size:0.92rem;color:white;outline:none;transition:all 0.2s;
}
.field input::placeholder{color:rgba(255,255,255,0.2);}
.field input:focus{border-color:rgba(56,189,248,0.5);background:rgba(255,255,255,0.08);box-shadow:0 0 0 3px rgba(56,189,248,0.08);}
#authMsg{display:none;padding:11px 14px;border-radius:10px;font-size:0.82rem;font-weight:600;margin-bottom:16px;text-align:center;}
.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#0369a1,#06b6d4);
  color:white;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.95rem;
  cursor:pointer;box-shadow:0 6px 20px rgba(6,182,212,0.3);transition:all 0.2s;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(6,182,212,0.4);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.back-link{text-align:center;margin-top:20px;font-size:0.8rem;color:rgba(255,255,255,0.3);}
.back-link a{color:rgba(56,189,248,0.6);text-decoration:none;}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="logo-icon">🛡️</div>
    <div class="logo-title">Admin Panel</div>
    <div class="logo-sub">CALL A FRIEND</div>
  </div>

  
  <div id="authMsg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="adminEmail" placeholder="akans47g@gmail.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="adminPass" placeholder="MISHAPKING47" onkeydown="if(event.key==='Enter')adminLogin()">
  </div>

  
  <button class="btn-login" id="loginBtn" onclick="adminLogin()">🔐 Admin Login</button>
  <div class="back-link"><a href="../index.html">← Main Website</a></div>
</div>
<script type="module">
import { auth } from "../js/firebase-config.js";
import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const ADMIN_EMAIL = "akans47g@gmail.com";
onAuthStateChanged(auth, u => { if(u) window.location.href="dashboard.html"; });
window.adminLogin = async function(){
  const email=document.getElementById("adminEmail").value.trim();
  const pass=document.getElementById("adminPass").value.trim();
  const btn=document.getElementById("loginBtn");
  if(!email||!pass){showMsg("Email aur Password dono dalo!","error");return;}
  btn.disabled=true;btn.textContent="Logging in...";
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    if(cred.user.email!==ADMIN_EMAIL){await signOut(auth);showMsg("❌ Aap admin nahi hain!","error");btn.disabled=false;btn.textContent="🔐 Admin Login";return;}
    window.location.href="dashboard.html";
  }catch(e){
    let m="❌ Login fail!";
    if(e.code==="auth/wrong-password")m="❌ Password galat hai!";
    if(e.code==="auth/user-not-found")m="❌ Email registered nahi!";
    showMsg(m,"error");btn.disabled=false;btn.textContent="🔐 Admin Login";
  }
};
function showMsg(m,t){const el=document.getElementById("authMsg");el.textContent=m;el.style.display="block";el.style.background=t==="error"?"rgba(239,68,68,0.15)":"rgba(34,197,94,0.15)";el.style.color=t==="error"?"#fca5a5":"#86efac";el.style.border=`1px solid ${t==="error"?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"}`;}
</script>
</body>
</html>
