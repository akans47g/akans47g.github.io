<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Call a Friend</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🤙</div>
    <div class="login-title">Call a Friend</div>
    <div class="login-sub">Login karo apni bookings dekhne ke liye aur zyada features use karo!</div>

    <div id="authError"></div>

    <button class="btn-google" onclick="googleLogin()">
      <svg class="g-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>ya Email se</span></div>

    <div id="emailForm">
      <input class="linput" type="email" id="lemail" placeholder="Email address">
      <input class="linput" type="password" id="lpass" placeholder="Password" onkeydown="if(event.key==='Enter')emailLogin()">
      <button class="btn-email" id="lbtn" onclick="emailLogin()">Login Karo</button>
      <div class="toggle-auth" onclick="toggleSignup()">Account nahi hai? <span id="toggleText">Sign Up karo</span></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </a>
  <a href="account.html" class="nav-item active">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Account</div>
  </a>
</nav>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyChyETFT5LuVb1tkj4R6IG5gx8tyaDJjuc",
  authDomain:"call-friend-b8bb3.firebaseapp.com",
  projectId:"call-friend-b8bb3",
  storageBucket:"call-friend-b8bb3.firebasestorage.app",
  messagingSenderId:"373738461022",
  appId:"1:373738461022:web:d9c74804f2018019b6e1cf"
});
const auth=firebase.auth();
let isSignup=false;

// Already logged in? account.html pe bhejo
auth.onAuthStateChanged(u=>{ if(u) window.location.href="account.html"; });

function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e=>showError(e.message));
}

function emailLogin(){
  const email=document.getElementById("lemail").value.trim();
  const pass=document.getElementById("lpass").value.trim();
  const btn=document.getElementById("lbtn");
  if(!email||!pass){showError("Email aur Password dono dalo!");return;}
  btn.disabled=true;btn.textContent=isSignup?"Creating...":"Logging in...";
  const action=isSignup?
    auth.createUserWithEmailAndPassword(email,pass):
    auth.signInWithEmailAndPassword(email,pass);
  action.then(()=>window.location.href="account.html")
  .catch(e=>{
    let m="❌ Error!";
    if(e.code==="auth/wrong-password")m="❌ Password galat hai!";
    if(e.code==="auth/user-not-found")m="❌ Account nahi hai!";
    if(e.code==="auth/email-already-in-use")m="❌ Email pehle se registered hai!";
    if(e.code==="auth/weak-password")m="❌ Password 6+ characters ka hona chahiye!";
    showError(m);btn.disabled=false;btn.textContent=isSignup?"Sign Up":"Login Karo";
  });
}

function toggleSignup(){
  isSignup=!isSignup;
  document.getElementById("lbtn").textContent=isSignup?"Sign Up":"Login Karo";
  document.getElementById("toggleText").textContent=isSignup?"Login karo":"Sign Up karo";
}

function showError(m){
  const el=document.getElementById("authError");
  el.textContent=m;el.style.display="block";
  setTimeout(()=>el.style.display="none",3000);
}

function toast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.style.display="block";
  setTimeout(()=>t.style.display="none",2500);
}
</script>
</body>
</html>
